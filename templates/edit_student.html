<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <head>
    <title>Students</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
</head>
<body>

<h1>Edit Student</h1>

<form action="/update/{{ student[0] }}" method="POST">

Name:
<input type="text" name="name" value="{{ student[1] }}">
<br><br>

Roll No:
<input type="text" name="roll_no" value="{{ student[2] }}">
<br><br>

Branch:
<input type="text" name="branch" value="{{ student[3] }}">
<br><br>

Year:
<input type="text" name="year" value="{{ student[4] }}">
<br><br>

Email:
<input type="email" name="email" value="{{ student[5] }}">
<br><br>

Phone:
<input type="text" name="phone" value="{{ student[6] }}">
<br><br>

<button type="submit">
Update Student
</button>

</form>

</body>
</html>
