<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
    <head>
    <title>Students</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
</head>
<body>

<h1>Student List</h1>
<form action="/search" method="POST">

    Search Student:

    <input type="text" name="keyword">

    <button type="submit">
        Search
    </button>

</form>

<br>

<table border="1">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Roll No</th>
    <th>Branch</th>
    <th>Year</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Action</th>
</tr>

{% for student in students %}

<tr>
    <td>{{ student[0] }}</td>
    <td>{{ student[1] }}</td>
    <td>{{ student[2] }}</td>
    <td>{{ student[3] }}</td>
    <td>{{ student[4] }}</td>
    <td>{{ student[5] }}</td>
    <td>{{ student[6] }}</td>

    <td>
    <a href="/edit/{{ student[0] }}">
        <button>Edit</button>
    </a>

    <a href="/delete/{{ student[0] }}">
        <button>Delete</button>
    </a>
    </td>
</tr>

{% endfor %}

</table>

</body>
</html>
